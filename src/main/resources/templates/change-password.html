<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>パスワード変更</title>
    <link rel="stylesheet" href="change-password.css">
</head>
<body>
    <div class="container">
        <h2>パスワード変更</h2>
        <form id="changePasswordForm">
            <label for="currentPassword">現在のパスワード</label>
            <input type="password" id="currentPassword" required>

            <label for="newPassword">新しいパスワード</label>
            <input type="password" id="newPassword" required placeholder="8～16文字のパスワード">

            <label for="confirmPassword">新しいパスワード（確認）</label>
            <input type="password" id="confirmPassword" required placeholder="再入力してください">

            <input type="submit" value="変更を保存">
            
            <div class="return-button">
                <a href="employee.html">社員情報画面に戻る</a>
            </div>
        </form>
        <p id="message"></p>
    </div>

    <script>
        document.getElementById('changePasswordForm').addEventListener('submit', function(event) {
            event.preventDefault();

            const currentPassword = document.getElementById('currentPassword').value;
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            const messageElement = document.getElementById('message');

            // パスワードの長さをチェック
            if (newPassword.length < 8 || newPassword.length > 16) {
                messageElement.textContent = '新しいパスワードは8文字以上16文字以下でなければなりません。';
                return;
            }

            // 確認パスワードが一致するかチェック
            if (newPassword !== confirmPassword) {
                messageElement.textContent = '新しいパスワードが一致しません。';
                return;
            }

            console.log('現在のパスワード:', currentPassword);
            console.log('新しいパスワード:', newPassword);
            messageElement.textContent = 'パスワードが変更されました。';
        });
    </script>
</body>
</html>
