<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>パスワード変更</title>
    <link rel="stylesheet" href="change-password.css">
    <script>
        function validatePassword() {
            const newPassword = document.getElementById('new-password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            const errorMessage = document.getElementById('error-message');

            // 文字数チェック
            if (newPassword.length < 8 || newPassword.length > 16) {
                errorMessage.textContent = "新しいパスワードは8文字以上16文字以下でなければなりません。";
                errorMessage.style.color = "red";
                return false; // フォーム送信をキャンセル
            }

            // 一致チェック
            if (newPassword !== confirmPassword) {
                errorMessage.textContent = "新しいパスワードと確認用パスワードが一致しません。";
                errorMessage.style.color = "red";
                return false; // フォーム送信をキャンセル
            }

            errorMessage.textContent = ""; // エラーメッセージをクリア
            return true; // フォーム送信を許可
        }
    </script>
</head>
<body>

    <div class="form-container">
        <h2>パスワード変更</h2>
        <form action="/change-password" method="POST" onsubmit="return validatePassword()">
            <div class="form-group">
                <label for="current-password">現在のパスワード</label>
                <input type="password" id="current-password" name="current-password" placeholder="現在のパスワードを入力" required>
            </div>
            <div class="form-group">
                <label for="new-password">新しいパスワード</label>
                <input type="password" id="new-password" name="new-password" placeholder="8文字以上16文字以下" required>
            </div>
            <div class="form-group">
                <label for="confirm-password">新しいパスワードの確認</label>
                <input type="password" id="confirm-password" name="confirm-password" placeholder="8文字以上16文字以下" required>
            </div>
            <div id="error-message"></div>
            <input type="submit" value="変更を保存">
            <a href="employee.html">社員情報画面に戻る</a>
        </form>
    </div>

</body>
</html>
