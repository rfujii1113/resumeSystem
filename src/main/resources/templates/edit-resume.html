<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>経歴書編集</title>
    <link rel="stylesheet" href="edit-resume.css">
</head>
<body>
    <div class="form-container">
        <h1>経歴書編集</h1>
        <h3>社員情報</h3>
        <form action="#" method="post">
            <div class="input-group">
                <label for="info">社員番号</label>
                <input type="text" id="empId" name="empId" required>
            </div>
            <div class="input-group">
                <label for="info">社員名</label>
                <input type="empName" id="empName" name="empName" required>
            </div>
            <div class="input-group">
                <label for="info">性別</label>
                <input type="gender" id="gender" name="gender" required>
            </div>
            <div class="input-group">
                <label for="info">生年月日</label>
                <input type="birthDate" id="birthDate" name="birthDate" required>
            </div>
            <div class="input-group">
                <label for="info">現住所</label>
                <textarea id="currentAddress" name="currentAddress" required></textarea>
            </div>
            <div class="input-group">
                <label for="info">本籍</label>
                <textarea id="permanentAddress" name="permanentAddress" required></textarea>
            </div>
            <div class="input-group">
                <label for="info">配偶者</label>
                <textarea id="spouse" name="spouse" required></textarea>
            </div>
            <div class="input-group">
                <label for="info">最終学校</label>
                <textarea id="lastSchool" name="lastSchool" required></textarea>
            </div>
            <div class="input-group">
                <label for="info">専攻学科</label>
                <textarea id="major" name="major" required></textarea>
            </div>
            <div class="input-group">
                <label for="info">卒業年月</label>
                <textarea id="graduationDate" name="graduationDate" required></textarea>
            </div>
            <div class="input-group">
                <label for="info">教育・研修</label>
                <textarea id="educationTraining" name="educationTraining" required></textarea>
            </div>
            <div class="input-group">
                <label for="info">最寄り駅</label>
                <textarea id="nearestStation" name="nearestStation" required></textarea>
            </div>
            <div class="input-group">
                <label for="info">権限区分</label>
            </div>
            <div class="input-group">
                <label for="info">部署</label>
                <textarea id="department" name="department" required></textarea>
            </div>
            <div class="input-group">
                <label for="info">パスワード</label>
                <textarea id="password" name="password" required></textarea>
            </div>
            <button type="submit">保存</button>
        </form>
    </div>
    <div class="return-button">
        <a href="resume.html">経歴書照会画面に戻る</a><br>
        <a href="employee.html">社員画面に戻る</a>
    </div>
</body>
</html>
